<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="quiz-box">

        <h1>Interactive Quiz App</h1>

        <div class="progress">
            Question <span id="current">1</span> of <span id="total">5</span>
        </div>
        <img src="images\quiz-banner.jpeg"
     alt="Quiz Banner"
     class="banner">

        <h2 id="question"></h2>

        <div id="answer-buttons" class="btn-container"></div>

        <button id="next-btn">Next</button>

    </div>

    <div id="result-box" class="hide">
        <h2>Your Score</h2>

        <h1 id="score"></h1>

        <button onclick="restartQuiz()">Restart Quiz</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
